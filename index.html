<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWF 2026 Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Auckland Writers Festival Planner</h1>
<p>Click an event to view details • <span class="hint-star">★</span> to mark as considering • ↗ to open event page</p>
</header>

<div id="day-tabs"></div>

<div id="calendar"></div>

<div id="tooltip"></div>

<div id="modal-overlay" class="hidden">
  <div id="modal">
    <button id="modal-close" aria-label="Close">✕</button>
    <div id="modal-header">
      <img id="modal-img" alt="">
      <div id="modal-meta">
        <h2 id="modal-title"></h2>
        <div id="modal-time"></div>
      </div>
    </div>
    <div id="modal-desc"></div>
    <div id="modal-actions">
      <button id="modal-toggle">Mark as Considering</button>
      <a id="modal-link" target="_blank" rel="noopener">Open event page →</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
